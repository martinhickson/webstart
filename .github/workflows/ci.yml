name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Build and test
    runs-on: ubuntu-latest
    env:
      MAVEN_OPTS: >-
        -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Verify reactor (unit tests, JaCoCo, servlet ITs)
        run: mvn --show-version --errors --batch-mode -ntp verify -Pintegration-test

      - name: Verify webstart-it (end-to-end plugin)
        run: mvn --errors --batch-mode -ntp verify -f webstart-it/pom.xml
