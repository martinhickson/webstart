name: Release

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version (e.g., 1.2.4-bravura)'
        required: true
        default: '1.2.4-bravura'
        type: string
      skipTests:
        description: 'Skip unit tests during build and deploy'
        required: false
        default: false
        type: boolean
      run_integration_tests:
        description: 'Run webstart-it integration project before tagging'
        required: false
        default: true
        type: boolean
      deploy_to_maven_central:
        description: 'Also publish to Maven Central'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      MAVEN_OPTS: >-
        -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn
      RELEASE_VERSION: ${{ github.event.inputs.release_version }}
      BRANCH_NAME: v${{ github.event.inputs.release_version }}
      TAG_NAME: v${{ github.event.inputs.release_version }}-release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create release branch
        run: |
          git checkout -b "${{ env.BRANCH_NAME }}"
          echo "Created branch: ${{ env.BRANCH_NAME }}"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Update versions in all POM files
        run: |
          mvn versions:set -DnewVersion="${RELEASE_VERSION}" -DprocessAllModules -DgenerateBackupPoms=false
          echo "Version update completed"

      - name: Verify version updates
        run: |
          echo "Root POM version:"
          grep -A 1 "<artifactId>webstart</artifactId>" pom.xml | grep "<version>"

      - name: Commit and push version changes
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Release version ${RELEASE_VERSION}"
            git push origin "${BRANCH_NAME}"
          fi

      - name: Configure Maven for GitHub Packages
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'EOF'
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0
                                        http://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>github-packages</id>
                <username>MAVEN_GITHUB_ACTOR</username>
                <password>MAVEN_GITHUB_TOKEN</password>
              </server>
            </servers>
          </settings>
          EOF
          sed -i "s|MAVEN_GITHUB_ACTOR|${GITHUB_ACTOR}|g; s|MAVEN_GITHUB_TOKEN|${GITHUB_TOKEN}|g" ~/.m2/settings.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Build and install plugin
        run: mvn clean install -ntp -DskipTests=${{ github.event.inputs.skipTests }}

      - name: Run webstart-it integration tests
        if: ${{ github.event.inputs.run_integration_tests == 'true' }}
        run: |
          mvn clean verify -ntp -f webstart-it/pom.xml -Dwebstart.plugin.version="${RELEASE_VERSION}"

      - name: Create and push tag
        run: |
          git tag -a "${TAG_NAME}" -m "Release ${RELEASE_VERSION}"
          git push origin "${TAG_NAME}"

      - name: Publish to GitHub Packages
        run: |
          mvn deploy -ntp -DskipTests=${{ github.event.inputs.skipTests }} \
            -DaltDeploymentRepository=github-packages::default::https://maven.pkg.github.com/${{ github.repository }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate Maven Central configuration
        if: ${{ github.event.inputs.deploy_to_maven_central == 'true' }}
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_CENTRAL_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_CENTRAL_GPG_PRIVATE_KEY }}
        run: |
          if [ -z "$MAVEN_CENTRAL_USERNAME" ] || [ -z "$MAVEN_CENTRAL_PASSWORD" ] || [ -z "$MAVEN_CENTRAL_GPG_PRIVATE_KEY" ]; then
            echo "::error::Maven Central publishing is not configured for this repository."
            exit 1
          fi

      - name: Configure Maven Central credentials
        if: ${{ github.event.inputs.deploy_to_maven_central == 'true' }}
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
        run: |
          sed -i "/<\/servers>/i\\
              <server>\\
                <id>central</id>\\
                <username>${MAVEN_CENTRAL_USERNAME}</username>\\
                <password>${MAVEN_CENTRAL_PASSWORD}</password>\\
              </server>" ~/.m2/settings.xml

      - name: Import GPG signing key
        if: ${{ github.event.inputs.deploy_to_maven_central == 'true' }}
        env:
          MAVEN_CENTRAL_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_CENTRAL_GPG_PRIVATE_KEY }}
        run: |
          echo "${MAVEN_CENTRAL_GPG_PRIVATE_KEY}" | gpg --batch --import --pinentry-mode loopback

      - name: Prepare POMs for Maven Central
        if: ${{ github.event.inputs.deploy_to_maven_central == 'true' }}
        run: |
          SCM_TAG="v${{ github.event.inputs.release_version }}-release"
          echo "Setting SCM tag to ${SCM_TAG}"
          mvn -ntp versions:set-scm-tag -DnewTag="${SCM_TAG}" -DgenerateBackupPoms=false

      - name: Publish to Maven Central
        if: ${{ github.event.inputs.deploy_to_maven_central == 'true' }}
        run: |
          mvn deploy -ntp -Pcentral-release -DskipTests=${{ github.event.inputs.skipTests }} \
            -Dgpg.passphrase="${MAVEN_CENTRAL_GPG_PASSPHRASE}"
        env:
          MAVEN_CENTRAL_GPG_PASSPHRASE: ${{ secrets.MAVEN_CENTRAL_GPG_PASSPHRASE }}

      - name: Prepare GitHub release notes
        run: |
          {
            echo "RELEASE_BODY<<EOF"
            echo "Release ${RELEASE_VERSION}"
            echo ""
            echo "This release includes:"
            echo "- Maven artifacts published to GitHub Packages"
            if [ "${{ github.event.inputs.deploy_to_maven_central }}" = "true" ]; then
              echo "- Maven artifacts published to Maven Central"
            fi
            echo "- Release branch: ${BRANCH_NAME}"
            echo "- Tag: ${TAG_NAME}"
            echo ""
            echo "Install with:"
            echo '```xml'
            echo "<plugin>"
            echo "  <groupId>io.github.martinhickson</groupId>"
            echo "  <artifactId>webstart-maven-plugin</artifactId>"
            echo "  <version>${RELEASE_VERSION}</version>"
            echo "</plugin>"
            echo '```'
            echo "EOF"
          } >> "${GITHUB_ENV}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-${{ github.event.inputs.release_version }}
          path: |
            **/target/*.jar
          retention-days: 30
          if-no-files-found: warn

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: Release ${{ env.RELEASE_VERSION }}
          body: ${{ env.RELEASE_BODY }}
          draft: false
          prerelease: false
          files: |
            **/target/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
