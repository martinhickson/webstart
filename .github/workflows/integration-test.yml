name: Integration Test

on:
  workflow_dispatch:

jobs:
  webstart-it:
    name: webstart-it (JDK 21)
    runs-on: ubuntu-latest
    env:
      MAVEN_OPTS: >-
        -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Install project (with tests)
        run: mvn --show-version --errors --batch-mode -ntp clean install

      - name: Verify installed plugin contains build report
        run: |
          PLUGIN_JAR="$HOME/.m2/repository/io/github/martinhickson/webstart-maven-plugin/1.0.1-bravura-SNAPSHOT/webstart-maven-plugin-1.0.1-bravura-SNAPSHOT.jar"
          test -f "$PLUGIN_JAR"
          jar tf "$PLUGIN_JAR" | grep -F 'org/codehaus/mojo/webstart/util/BuildReport.class'

      - name: Run webstart-it
        run: mvn --errors --batch-mode -ntp -nsu clean verify -f webstart-it/pom.xml
